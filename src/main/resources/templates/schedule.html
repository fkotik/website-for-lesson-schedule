<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Расписание группы ' + ${group.groupName}">Расписание</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-body-secondary">

<div class="container py-4">

    <!-- Навигация -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Главная</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/group/{id}(id=${group.groupId})}" th:text="${group.groupName}">Группа</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Расписание</li>
        </ol>
    </nav>

    <!-- Заголовок -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="mb-0 fs-3">
            Расписание группы <span class="text-primary" th:text="${group.groupName}"></span>
        </h1>
        <a th:href="@{/group/{id}(id=${group.groupId})}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад
        </a>
    </div>


    <!-- ============ РАСПИСАНИЕ ПО ДНЯМ ============ -->
    <div th:if="${!schedulesByDate.isEmpty()}">
        <div th:each="entry : ${schedulesByDate}" class="mb-4">

            <!-- Заголовок дня -->
            <div class="card-header bg-dark text-white rounded-top-3 py-3 px-4 fs-6 fw-semibold">
                <span th:text="${#temporals.format(entry.key, 'EEEE, d MMMM yyyy')}">
                    Понедельник, 1 января 2025
                </span>
            </div>

            <!-- Список занятий -->
            <div class="card rounded-top-0 shadow-sm">
                <div class="card-body">

                    <div th:each="lesson, iterStat : ${entry.value}">

                        <!-- Разделитель между занятиями -->
                        <hr th:if="${!iterStat.first}" class="my-3"/>

                        <div class="row align-items-center">

                            <!-- Время -->
                            <div class="col-md-2 mb-2 mb-md-0">
                                <div class="bg-light rounded-3 p-2 text-center">
                                    <div class="text-muted small"
                                         th:text="${lesson.timeslot.slotNumber} + ' пара'">
                                        1 пара
                                    </div>
                                    <div class="fw-bold fs-6">
                                        <span th:text="${#temporals.format(lesson.timeslot.startTime, 'HH:mm')}">08:00</span>
                                        <span class="text-muted">–</span>
                                        <span th:text="${#temporals.format(lesson.timeslot.endTime, 'HH:mm')}">09:35</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Информация о занятии -->
                            <div class="col-md-7 mb-2 mb-md-0">

                                <!-- Название дисциплины -->
                                <h6 class="mb-1 fw-bold" th:text="${lesson.discipline.disciplineName}">
                                    Дисциплина
                                </h6>

                                <!-- Преподаватель -->
                                <div class="text-muted small mb-1">
                                    <span th:text="${lesson.teacher.lastName + ' ' + lesson.teacher.firstName}">
                                        Преподаватель
                                    </span>
                                    <span th:if="${lesson.teacher.academicDegree != null}"
                                          class="ms-1 text-secondary"
                                          th:text="'(' + ${lesson.teacher.academicDegree} + ')'">
                                    </span>
                                </div>

                                <!-- Аудитория -->
                                <div class="small">
                                    <span class="fw-semibold">
                                        Ауд. <span th:text="${lesson.classroom.roomNumber}">101</span>
                                    </span>
                                    <span class="text-muted" th:text="', ' + ${lesson.classroom.building}">
                                        , Корпус А
                                    </span>
                                    <span class="text-muted"
                                          th:if="${lesson.classroom.classroomType != null}"
                                          th:text="'(' + ${lesson.classroom.classroomType} + ')'">
                                    </span>
                                </div>
                            </div>

                            <!-- Тип занятия -->
                            <div class="col-md-3 text-md-end">
                                <span th:switch="${lesson.lessonType.name()}">
                                    <span th:case="'lecture'" class="badge bg-primary fs-6">
                                        Лекция
                                    </span>
                                    <span th:case="'seminar'" class="badge bg-success fs-6">
                                        Семинар
                                    </span>
                                    <span th:case="'lab'" class="badge bg-warning text-dark fs-6">
                                        Лабораторная
                                    </span>
                                </span>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Если расписания нет -->
    <div th:if="${schedulesByDate.isEmpty()}" class="card shadow-sm">
        <div class="card-body text-center py-5">
            <i class="bi bi-calendar-x display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">Расписание для группы пока не составлено</h4>
            <a th:href="@{/group/{id}(id=${group.groupId})}" class="btn btn-outline-primary mt-3">
                <i class="bi bi-arrow-left"></i> Вернуться к группе
            </a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
